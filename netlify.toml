[build]
  command = "bash scripts/netlify-build.sh"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Standalone functions live here alongside the Next app: the scheduled cron
# shims (blog-generate-daily, blog-publish-sweep) and the long-running image
# worker (*-background). Each declares its own schedule/behaviour in code.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# The background image worker imports Prisma. Netlify's bundler auto-detects
# Prisma, but include the query-engine binary + schema explicitly so the
# bundled function can reach the database at runtime.
[functions."blog-image-worker-background"]
  included_files = ["node_modules/.prisma/client/*.node", "prisma/schema.prisma"]

# Long cache for static assets, no-cache for HTML
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
